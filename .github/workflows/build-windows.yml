name: Build Windows

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
        configuration:
          description: 'Build configuration'
          required: true
          default: 'Release'
          type: choice
          options:
            - Release
            - Debug

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 120
    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Debug - List workspace contents
        run: |
          echo "=== GITHUB_WORKSPACE = ${env:GITHUB_WORKSPACE} ==="
          Get-ChildItem -Path "${env:GITHUB_WORKSPACE}" -Recurse -Depth 2 | Where-Object { $_.Extension -eq '.sln' -or $_.Name -like 'windows*' } | ForEach-Object { Write-Host "Found: $($_.FullName)" }
        shell: powershell

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            **/node_modules
            **/.expo
          key: ${{ runner.os }}-deps-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: Install dependencies
        run: npm ci

      - name: Install Windows build tools
        run: |
          choco install -y visualstudio2022buildtools --version 17.8.0
          choco install -y windows-sdk-10.1
        shell: powershell

      - name: Install React Native Windows dependencies
        run: |
          $scriptPath = "node_modules\\react-native-windows\\scripts\\rnw-dependencies.ps1"
          if (Test-Path $scriptPath) {
            & $scriptPath vs2022
          } else {
            Write-Warning "rnw-dependencies.ps1 not found at $scriptPath"
          }
        shell: powershell

      - name: Restore NuGet Packages
        run: nuget restore windows/Orchestra.sln
        shell: powershell

      - name: Build Windows (MSBuild)
        run: |
          $outDir = "${env:GITHUB_WORKSPACE}/windows/AppPackages/"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          $slnPath = "${env:GITHUB_WORKSPACE}/windows/Orchestra.sln"
          if (-not (Test-Path $slnPath)) {
            Write-Error "Solution file not found at: $slnPath"
            exit 1
          }
          # Use the MSBuild from the PATH (setup-msbuild adds it) with 64-bit preference
          msbuild $slnPath `
            /p:Configuration="Release" `
            /p:Platform="x64" `
            /p:AppxBundle=Always `
            /p:AppxPackageDir="${env:GITHUB_WORKSPACE}/windows/AppPackages/" `
            /p:PreferredToolArchitecture=x64 `
            /maxcpucount:1 `
            /verbosity:minimal
        shell: powershell

      - name: Create self-signed certificate for signing
        run: |
          # Create certificate with Legacy CSP (not CNG) for SignTool compatibility
          $cert = New-SelfSignedCertificate `
            -Type CodeSigningCert `
            -Subject "CN=Orchestra" `
            -KeyUsage DigitalSignature `
            -KeyAlgorithm RSA `
            -KeyLength 2048 `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -FriendlyName "Orchestra CI Cert" `
            -NotAfter (Get-Date).AddYears(1) `
            -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3") `
            -Provider "Microsoft Enhanced RSA and AES Cryptographic Provider" `
            -KeyExportPolicy Exportable
          $cert | Export-PfxCertificate -FilePath "orchestra-ci.pfx" -Password (ConvertTo-SecureString -String "ci-temp-pass" -AsPlainText -Force)
          echo "CERT_THUMBPRINT=$($cert.Thumbprint)" >> $env:GITHUB_ENV
        shell: powershell

      - name: Sign MSIX packages
        run: |
          # Find signtool in the Windows SDK
          $signtoolPath = Get-Command signtool.exe -ErrorAction SilentlyContinue
          if (-not $signtoolPath) {
            $signtoolPath = "C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0\x64\signtool.exe"
            if (-not (Test-Path $signtoolPath)) {
              $signtoolPath = "C:\Program Files (x86)\Windows Kits\10\bin\10.0.19041.0\x64\signtool.exe"
            }
          }
          if (-not (Test-Path $signtoolPath)) {
            Write-Error "signtool.exe not found!"
            exit 1
          }
          Write-Host "Using signtool: $signtoolPath"
          
          # Sign individual MSIX packages (the bundle references these)
          Get-ChildItem -Path windows -Filter "*.msix" -Recurse | ForEach-Object {
            Write-Host "Signing $($_.FullName)..."
            & $signtoolPath sign /fd SHA256 /f "orchestra-ci.pfx" /p "ci-temp-pass" /tr http://timestamp.digicert.com /td SHA256 $_.FullName
            if ($LASTEXITCODE -ne 0) {
              Write-Error "Failed to sign $($_.FullName)"
              exit 1
            }
          }
        shell: powershell

      - name: Re-bundle signed packages (if needed)
        run: |
          # The AppxBundle=Always should have created a bundle that references the signed packages
          # Verify the bundle exists
          Get-ChildItem -Path windows -Filter "*.msixbundle" -Recurse | ForEach-Object { Write-Host "Bundle found: $($_.FullName)" }
        shell: powershell

      - name: Export certificate for installation
        run: |
          $cert = Get-Item Cert:\CurrentUser\My\$env:CERT_THUMBPRINT
          $cert | Export-Certificate -FilePath "orchestra-installer.cer"
        shell: powershell

      - name: Find MSIX packages
        run: |
          Get-ChildItem -Path windows -Filter "*.msix" -Recurse | ForEach-Object { echo "$($_.FullName)" }
        shell: powershell

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: orchestra-windows-${{ github.event.inputs.configuration || 'Release' }}
          path: |
            windows/**/AppPackages/**/*.msix
            windows/**/AppPackages/**/*.msixbundle
            orchestra-installer.cer
          retention-days: 30

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-error-logs
          path: |
            **/*.log
            **/msbuild.binlog
          retention-days: 7