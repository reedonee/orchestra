name: Build Windows

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
        configuration:
          description: 'Build configuration'
          required: true
          default: 'Release'
          type: choice
          options:
            - Release
            - Debug

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            **/node_modules
            **/.expo
          key: ${{ runner.os }}-deps-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: Install dependencies
        run: npm ci

      - name: Install Windows build tools
        run: |
          choco install -y visualstudio2022buildtools --version 17.8.0
          choco install -y windows-sdk-10.1
        shell: powershell

      - name: Install React Native Windows dependencies
        run: |
          # Install RNW dependencies (requires admin)
          # Valid tags: appDev, rnwDev, buildLab, vs2022, clone
          $scriptPath = "node_modules\react-native-windows\scripts\rnw-dependencies.ps1"
          if (Test-Path $scriptPath) {
            & $scriptPath vs2022
          } else {
            Write-Warning "rnw-dependencies.ps1 not found at $scriptPath"
          }
        shell: powershell

      - name: Build Windows (MSBuild)
        run: |
          # Build using MSBuild directly on the solution
          $msbuild = "${env:ProgramFiles}\Microsoft Visual Studio\2022\BuildTools\MSBuild\Current\Bin\MSBuild.exe"
          if (-not (Test-Path $msbuild)) {
            $msbuild = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\2022\BuildTools\MSBuild\Current\Bin\MSBuild.exe"
          }
          $outDir = "${env:GITHUB_WORKSPACE}/windows/AppPackages/"
          & $msbuild windows/Orchestra.sln -p:Configuration=Release -p:Platform=x64 -p:AppxBundle=Always -p:AppxPackageDir="$outDir" -v:m
        shell: powershell

      - name: Find MSIX packages
        run: |
          Get-ChildItem -Path windows -Filter "*.msix" -Recurse | ForEach-Object { echo "$($_.FullName)" }
        shell: powershell

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: orchestra-windows-${{ github.event.inputs.configuration || 'Release' }}
          path: |
            windows/**/AppPackages/**/*.msix
            windows/**/AppPackages/**/*.msixbundle
          retention-days: 30

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-error-logs
          path: |
            **/*.log
            **/msbuild.binlog
          retention-days: 7
